<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#111111"/>

  <!--
    "Anisita" wordmark centered on dark background.
    The letterforms are scaled up from the topbar version.
    Route connector, origin/destination dots included.
  -->
  <g transform="translate(18, 80) scale(2.5)">
    <!-- Route connector: subtle dashed line -->
    <path d="M6.5 4 C6.5 12, 15 20, 15 20 L23 20 L27 20 L31 20 L40 20 L46.5 20 L61 20"
          stroke="#7C3AED" stroke-width="0.5" stroke-dasharray="1.5 2" stroke-linecap="round" opacity="0.2"/>

    <g stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- A -->
      <path d="M2 20 L6.5 5 L11 20"/>
      <path d="M3.8 15 L9.2 15"/>
      <!-- n -->
      <path d="M15 20 L15 11.5 Q15 8.5 19 8.5 Q23 8.5 23 11.5 L23 20"/>
      <!-- i -->
      <path d="M27 9 L27 20"/>
      <!-- s -->
      <path d="M36 10 Q35.5 8.5 33.5 8.5 Q31 8.5 31 10.5 Q31 12.5 33.5 13.5 Q36 14.5 36 16.5 Q36 20 33.5 20 Q31 20 31 17.5"/>
      <!-- i -->
      <path d="M40 9 L40 20"/>
      <!-- t -->
      <path d="M46.5 5 L46.5 17.5 Q46.5 20 49 20"/>
      <path d="M44 9 L49 9"/>
      <!-- a -->
      <path d="M61 10.5 Q60.5 8.5 57 8.5 Q53 8.5 53 12 L53 16 Q53 20 57 20 Q61 20 61 16.5 L61 9 L61 20"/>
    </g>

    <!-- i dots -->
    <circle cx="27" cy="5.5" r="1.3" fill="#7C3AED"/>
    <circle cx="40" cy="5.5" r="1.3" fill="#7C3AED"/>

    <!-- Origin dot -->
    <circle cx="6.5" cy="4" r="2.5" fill="#7C3AED" opacity="0.15"/>
    <circle cx="6.5" cy="4" r="1.2" fill="#7C3AED"/>

    <!-- Destination dot -->
    <circle cx="61" cy="20" r="2.5" fill="#22C55E" opacity="0.15"/>
    <circle cx="61" cy="20" r="1.2" fill="#22C55E"/>
  </g>
</svg>
