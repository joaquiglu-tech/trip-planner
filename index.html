<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Anisita</title>
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root">
      <div
        id="boot-fallback"
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; color: #eee; font-family: system-ui, sans-serif"
      >
        Loading…
      </div>
    </div>
    <script>
      // Boot safety net: if the app bundle fails at startup (e.g. missing env
      // vars → services/supabase.js throws at module load), React never mounts
      // and #root stays as this fallback. Surface a readable message instead of
      // a blank/black screen. main.jsx sets window.__APP_MOUNTED__ on success.
      setTimeout(function () {
        if (!window.__APP_MOUNTED__) {
          var f = document.getElementById("boot-fallback");
          if (f)
            f.textContent =
              "Couldn't load the app. Check your connection and reload — if this keeps happening, the app may be misconfigured.";
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
